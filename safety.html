<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Safety · EVGCPL Portal</title>
<link rel="icon" type="image/jpeg" href="assets/img/EG.jpg"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/portal.css"/>
<style>
  /* Safety-specific */
  .check-item {
    display:flex; align-items:center; gap:.7rem;
    padding:.5rem 0;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    transition:background var(--t-fast);
  }
  .check-item:last-child { border-bottom:none; }
  .check-item:hover { background:var(--surface2); }
  .check-item input[type="checkbox"] {
    width:16px; height:16px; cursor:pointer; accent-color:var(--g7); flex-shrink:0;
  }
  .check-item .lbl { flex:1; font-size:.84rem; }
  .check-item.done .lbl { text-decoration:line-through; color:var(--txt3); }
  .check-cat {
    font-size:.65rem; font-weight:700;
    background:rgba(46,125,50,.12); color:#15803d;
    padding:2px 7px; border-radius:99px;
    white-space:nowrap;
  }
  .progress-bar {
    background:var(--surface3); border-radius:99px;
    height:8px; overflow:hidden; margin-bottom:.85rem;
  }
  .progress-bar .fill {
    height:100%; border-radius:99px;
    transition:width .4s ease-out, background .3s;
  }
  .field {
    display:flex; flex-direction:column; gap:.3rem; margin-bottom:.65rem;
  }
  .field label {
    font-size:.72rem; font-weight:700; color:var(--txt2);
    text-transform:uppercase; letter-spacing:.04em;
  }
  .field input, .field select, .field textarea {
    padding:.5rem .7rem;
    border:1px solid var(--border); border-radius:8px;
    font-family:inherit; font-size:.84rem;
    background:var(--surface); color:var(--txt);
    width:100%; box-sizing:border-box;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline:none; border-color:var(--g5);
  }
  .field textarea { resize:vertical; min-height:72px; }
  .submit-msg {
    font-size:.8rem; padding:.45rem .7rem; border-radius:8px;
    margin-bottom:.5rem; display:none;
  }
  .submit-msg.ok  { background:rgba(46,125,50,.12); color:#15803d; display:block; }
  .submit-msg.bad { background:rgba(220,38,38,.12); color:#b91c1c; display:block; }

  @media (max-width: 880px) {
    .safety-grid { grid-template-columns:1fr !important; }
  }
</style>
</head>
<body>

<div data-shell-root></div>

<main class="shell-main">
  <div id="pageHead"></div>
  <div id="errorSlot"></div>

  <!-- KPIs -->
  <section class="kpi-grid" id="sfKpis" style="margin-bottom:1.2rem">
    <div class="kpi"><div class="skel" style="height:80px"></div></div>
    <div class="kpi"><div class="skel" style="height:80px"></div></div>
    <div class="kpi"><div class="skel" style="height:80px"></div></div>
    <div class="kpi"><div class="skel" style="height:80px"></div></div>
  </section>

  <!-- Two-column row -->
  <section class="safety-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.4rem">
    <!-- Daily checklist -->
    <div class="card" id="sfChecklistCard">
      <div class="card-head">
        <h3 id="sfChecklistTitle">✓ Daily safety checklist</h3>
        <span class="tag" id="sfChecklistBadge">—</span>
      </div>
      <div class="card-body">
        <div class="progress-bar"><div class="fill" id="sfProgressFill" style="width:0%;background:var(--g5)"></div></div>
        <div id="sfChecklist"></div>
        <div style="margin-top:.7rem;display:flex;gap:.5rem">
          <button class="btn btn-primary btn-sm" style="flex:1" id="sfMarkAll">✓ Mark all safe</button>
          <button class="btn btn-secondary btn-sm" id="sfClearAll">Reset</button>
        </div>
        <div id="sfChecklistStatus" style="margin-top:.5rem;font-size:.76rem;color:var(--txt3);text-align:center"></div>
      </div>
    </div>

    <!-- Report incident -->
    <div class="card">
      <div class="card-head"><h3>🚨 Report incident</h3></div>
      <div class="card-body">
        <div class="field"><label>Type</label>
          <select id="incType">
            <option>Near Miss</option><option>First Aid</option><option>Property Damage</option>
            <option>Lost Time Injury</option><option>Fire/Explosion</option><option>Environmental</option>
          </select>
        </div>
        <div class="field"><label>Severity</label>
          <select id="incSev"><option>Low</option><option>Medium</option><option>High</option><option>Critical</option></select>
        </div>
        <div class="field"><label>Description *</label>
          <textarea id="incDesc" rows="3" placeholder="Describe what happened…"></textarea>
        </div>
        <div class="field"><label>Employee involved <span style="font-weight:400;text-transform:none;color:var(--txt3)">(optional)</span></label>
          <input id="incEmp" type="text" placeholder="Employee name"/>
        </div>
        <div class="field"><label>Reported by</label>
          <input id="incBy" type="text" placeholder="Your name"/>
        </div>
        <div class="submit-msg" id="incMsg"></div>
        <button class="btn btn-primary" id="incSubmit" style="width:100%;background:#dc2626;color:#fff">🚨 Submit incident report</button>
      </div>
    </div>
  </section>

  <!-- Incident log -->
  <div class="card">
    <div class="card-head">
      <h3>📋 Incident log</h3>
      <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
        <span class="tag" id="sfLogBadge">—</span>
        <select id="sfLogFilter" class="btn btn-secondary btn-sm" style="padding-right:1.5rem">
          <option value="">All sites</option>
        </select>
        <button class="btn btn-secondary btn-sm" id="sfReloadBtn">↻ Reload from sheet</button>
      </div>
    </div>
    <div class="card-body" style="padding:0;overflow-x:auto" id="sfIncidentLog">
      <div style="padding:2rem;text-align:center;color:var(--txt3);font-size:.85rem">Loading incidents…</div>
    </div>
  </div>

</main>

<script src="assets/js/state.js"></script>
<script src="assets/js/data-bindings.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/nav-config.js"></script>
<script src="assets/js/shell.js"></script>
<script src="assets/js/modules/safety.js"></script>

</body>
</html>
