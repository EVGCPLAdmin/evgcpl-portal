// ─── APPROVAL TIMELINE ────────────────────────────────────────
function ApprovalTimeline({ bill }) {
  const stageOrder = ['draft','pending','finance_approved','director_approved','paid'];
  const isRejected = bill.status === 'rejected';
  const currentIdx = isRejected ? -1 : stageOrder.indexOf(bill.status);

  const stageInfo = {
    draft:             { by: '', at: '' },
    pending:           { by: '', at: '' },
    finance_approved:  { by: bill.financeApprovedBy,  at: bill.financeApprovedAt },
    director_approved: { by: bill.directorApprovedBy, at: bill.directorApprovedAt },
    paid:              { by: '', at: '' },
  };

  return (
    <div style={{ marginTop: 12 }}>
      {isRejected && (
        <div style={{ background:'rgba(220,38,38,0.10)', border:'1px solid rgba(220,38,38,0.25)', borderRadius:10, padding:'10px 14px', marginBottom:12 }}>
          <div style={{ display:'flex', gap:8, alignItems:'center', color:'#DC2626', fontWeight:700, fontSize:12, marginBottom:4 }}>
            <X size={13}/> Rejected{bill.rejectedBy ? ` by ${bill.rejectedBy}` : ''}
          </div>
          {bill.rejectedAt && <div style={{ fontSize:11, color:'var(--text-3)', marginBottom:4 }}>{fmtDateTime(bill.rejectedAt)}</div>}
          {bill.rejectionNote && <div style={{ fontSize:12, color:'var(--text-2)', fontStyle:'italic' }}>"{bill.rejectionNote}"</div>}
        </div>
      )}
      <div style={{ display:'flex', alignItems:'center', gap:0 }}>
        {stageOrder.map((key, i) => {
          const stage = getStage(key);
          const done  = !isRejected && currentIdx >= i;
          const active = !isRejected && currentIdx === i;
          const info  = stageInfo[key];
          const Icon  = stage.Icon;
          return (
            <React.Fragment key={key}>
              <div className="pipeline-step" style={{ textAlign:'center' }}>
                <div style={{
                  width: 32, height: 32, borderRadius: '50%', margin: '0 auto 4px',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  background: done ? stage.color : 'var(--surface-3)',
                  border: `2px solid ${done ? stage.color : 'var(--border)'}`,
                  boxShadow: active ? `0 0 0 3px ${stage.color}33` : 'none',
                  transition: 'all 0.2s',
                }}>
                  <Icon size={13} style={{ color: done ? '#fff' : 'var(--text-4)' }} />
                </div>
                <div style={{ fontSize: 9, fontWeight: 700, textTransform:'uppercase', letterSpacing:'0.05em', color: done ? stage.color : 'var(--text-4)', lineHeight:1.2 }}>{stage.short}</div>
                {info.by && <div style={{ fontSize: 9, color:'var(--text-3)', marginTop:2 }}>{info.by}</div>}
              </div>
              {i < stageOrder.length - 1 && (
                <div className="pipeline-connector" style={{ background: done && currentIdx > i ? stage.color : 'var(--border)', transition:'background 0.3s', marginBottom:20, flexShrink:0, minWidth:8 }} />
              )}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

// ─── APPROVAL ACTIONS PANEL ───────────────────────────────────
function ApprovalActions({ bill, onUpdate }) {
  const [finBy, setFinBy]           = useState('');
  const [dirBy, setDirBy]           = useState('');
  const [rejBy, setRejBy]           = useState('');
  const [rejNote, setRejNote]       = useState('');
  const [showReject, setShowReject] = useState(false);

  if (!bill) return null;
  const { status } = bill;
  const canFinance  = status === 'pending';
  const canDirector = status === 'finance_approved';
  const canPay      = status === 'director_approved';
  const canReject   = ['pending','finance_approved','director_approved'].includes(status);

  if (!canFinance && !canDirector && !canPay && !canReject) return null;

  const approve = (nextStatus, extraFields) => {
    onUpdate({ ...bill, status: nextStatus, ...extraFields });
  };

  const btnBase = { border:'none', borderRadius:10, padding:'8px 16px', fontWeight:700, fontSize:12, cursor:'pointer', display:'flex', alignItems:'center', gap:6 };

  return (
    <div style={{ marginTop:12, background:'var(--surface-2)', border:'1px solid var(--border)', borderRadius:12, padding:14 }}>
      <div style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', color:'var(--text-3)', marginBottom:10 }}>Approval Actions</div>

      {canFinance && (
        <div style={{ marginBottom:10 }}>
          <label style={{ fontSize:11, color:'var(--text-3)', fontWeight:600, display:'block', marginBottom:4 }}>Finance Approver Name</label>
          <div style={{ display:'flex', gap:8 }}>
            <input value={finBy} onChange={e=>setFinBy(e.target.value)} placeholder="e.g. S. Mehta"
              style={{ flex:1, padding:'8px 12px', borderRadius:9, border:'1px solid var(--border)', background:'var(--surface)', color:'var(--text)', fontSize:13, outline:'none' }} />
            <button disabled={!finBy.trim()} onClick={()=>approve('finance_approved',{ financeApprovedBy: finBy.trim(), financeApprovedAt: nowISO() })}
              style={{ ...btnBase, background:'#2563EB', color:'#fff', opacity:finBy.trim()?1:0.5 }}>
              <ThumbsUp size={13}/>Finance Approve
            </button>
          </div>
        </div>
      )}

      {canDirector && (
        <div style={{ marginBottom:10 }}>
          <label style={{ fontSize:11, color:'var(--text-3)', fontWeight:600, display:'block', marginBottom:4 }}>Director / C-Level Approver Name</label>
          <div style={{ display:'flex', gap:8 }}>
            <input value={dirBy} onChange={e=>setDirBy(e.target.value)} placeholder="e.g. R. Nair"
              style={{ flex:1, padding:'8px 12px', borderRadius:9, border:'1px solid var(--border)', background:'var(--surface)', color:'var(--text)', fontSize:13, outline:'none' }} />
            <button disabled={!dirBy.trim()} onClick={()=>approve('director_approved',{ directorApprovedBy: dirBy.trim(), directorApprovedAt: nowISO() })}
              style={{ ...btnBase, background:'#7C3AED', color:'#fff', opacity:dirBy.trim()?1:0.5 }}>
              <ShieldCheck size={13}/>Director Approve
            </button>
          </div>
        </div>
      )}

      {canPay && (
        <button onClick={()=>approve('paid',{})} style={{ ...btnBase, background:'#16A34A', color:'#fff', marginBottom:10 }}>
          <CheckCircle2 size={13}/>Mark as Paid
        </button>
      )}

      {canReject && !showReject && (
        <button onClick={()=>setShowReject(true)} style={{ ...btnBase, background:'rgba(220,38,38,0.10)', color:'#DC2626' }}>
          <ThumbsDown size={13}/>Reject
        </button>
      )}

      {canReject && showReject && (
        <div style={{ background:'rgba(220,38,38,0.07)', border:'1px solid rgba(220,38,38,0.2)', borderRadius:10, padding:12, marginTop:4 }}>
          <label style={{ fontSize:11, color:'#DC2626', fontWeight:600, display:'block', marginBottom:4 }}>Rejection Details</label>
          <input value={rejBy} onChange={e=>setRejBy(e.target.value)} placeholder="Rejected by (name)"
            style={{ width:'100%', padding:'7px 10px', borderRadius:8, border:'1px solid rgba(220,38,38,0.3)', background:'var(--surface)', color:'var(--text)', fontSize:12, outline:'none', marginBottom:6 }} />
          <textarea value={rejNote} onChange={e=>setRejNote(e.target.value)} placeholder="Reason for rejection…" rows={2}
            style={{ width:'100%', padding:'7px 10px', borderRadius:8, border:'1px solid rgba(220,38,38,0.3)', background:'var(--surface)', color:'var(--text)', fontSize:12, outline:'none', resize:'vertical', marginBottom:8 }} />
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={()=>setShowReject(false)} style={{ ...btnBase, background:'var(--surface-3)', color:'var(--text-3)' }}>Cancel</button>
            <button disabled={!rejBy.trim()} onClick={()=>approve('rejected',{ rejectedBy:rejBy.trim(), rejectedAt:nowISO(), rejectionNote:rejNote.trim() })}
              style={{ ...btnBase, background:'#DC2626', color:'#fff', opacity:rejBy.trim()?1:0.5 }}>
              <X size={12}/>Confirm Reject
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── FIELD / INPUT PRIMITIVES ─────────────────────────────────
const inputStyle = { background:'var(--surface-2)', border:'1px solid var(--border)', borderRadius:10, padding:'10px 13px', width:'100%', color:'var(--text)', fontSize:13, outline:'none', fontFamily:'inherit' };

function Field({ label, children, wide }) {
  return (
    <div style={{ gridColumn: wide ? '1 / -1' : undefined }}>
      <label style={{ display:'block', fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', color:'var(--text-3)', marginBottom:5 }}>{label}</label>
      {children}
    </div>
  );
}

function Input({ value, onChange, placeholder, type='text', maxLength, style:extraStyle={} }) {
  return <input type={type} value={value} onChange={onChange} placeholder={placeholder} maxLength={maxLength} style={{...inputStyle,...extraStyle}} />;
}

function ComboBox({ value, onChange, options, placeholder, createLabel }) {
  const [open, setOpen] = useState(false);
  const [q, setQ]       = useState('');
  const ref             = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const filtered = options.filter(o => o.toLowerCase().includes(q.toLowerCase()));
  const showCreate = q.trim() && !options.some(o => o.toLowerCase() === q.toLowerCase());

  return (
    <div ref={ref} style={{ position:'relative' }}>
      <input value={open ? q : value} onFocus={() => { setOpen(true); setQ(''); }}
        onChange={e => { setQ(e.target.value); if (!open) setOpen(true); }}
        placeholder={placeholder} style={{ ...inputStyle, cursor:'pointer' }} />
      {open && (
        <div style={{ position:'absolute', top:'100%', left:0, right:0, marginTop:4, background:'var(--surface-elevated)', border:'1px solid var(--border)', borderRadius:10, boxShadow:'var(--shadow-md)', zIndex:50, maxHeight:200, overflowY:'auto' }}>
          {filtered.map(o => (
            <div key={o} onClick={() => { onChange(o); setOpen(false); setQ(''); }}
              style={{ padding:'8px 12px', cursor:'pointer', fontSize:13, color:'var(--text)', background: o === value ? 'var(--surface-3)' : 'transparent' }}
              onMouseEnter={e => e.currentTarget.style.background='var(--surface-2)'}
              onMouseLeave={e => e.currentTarget.style.background = o === value ? 'var(--surface-3)' : 'transparent'}>
              {o}
            </div>
          ))}
          {showCreate && (
            <div onClick={() => { onChange(q.trim()); setOpen(false); setQ(''); }}
              style={{ padding:'8px 12px', cursor:'pointer', fontSize:13, color:'var(--brand-1)', borderTop:'1px solid var(--border)' }}>
              + Add "{q.trim()}" as new {createLabel}
            </div>
          )}
          {filtered.length === 0 && !showCreate && (
            <div style={{ padding:'8px 12px', fontSize:12, color:'var(--text-4)' }}>No matches</div>
          )}
        </div>
      )}
    </div>
  );
}

function Section({ title, accent, Icon: SIcon, children }) {
  return (
    <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:16, padding:18, boxShadow:'var(--shadow-sm)' }}>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:14 }}>
        {SIcon && <div style={{ width:26, height:26, borderRadius:8, background: accent+'22', display:'flex', alignItems:'center', justifyContent:'center' }}><SIcon size={13} style={{ color:accent }} /></div>}
        <span style={{ fontSize:12, fontWeight:700, color:'var(--text)' }}>{title}</span>
        <div style={{ flex:1, height:1, background:`linear-gradient(90deg,${accent}44,transparent)` }} />
      </div>
      {children}
    </div>
  );
}

// ─── BILL FORM ────────────────────────────────────────────────
function BillForm({ onSave, projects, parties, bills, onCreateProject, editingBill, onClose }) {
  const [form, setForm] = useState(editingBill ? { ...emptyForm, ...editingBill } : { ...emptyForm });
  const isEditing = !!editingBill;

  const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const activeMode = PAYMENT_MODES.find(m => m.value === form.paymentMode) || PAYMENT_MODES[0];

  const projectNames    = projects.filter(p=>p.enabled).map(p=>p.name);
  const allPartyOptions = [...new Set([...parties.map(p=>p.name), form.paidBy, form.paidTo, form.financeApprovedBy, form.directorApprovedBy].filter(Boolean))];

  const autoBillNumber = () => {
    const proj = projects.find(p=>p.name===form.project);
    if (!proj || form.billNumber) return;
    const count = (bills.filter(b=>b.project===form.project).length) + 1;
    update('billNumber', `${proj.prefix}-${String(count).padStart(3,'0')}`);
  };

  const save = (e) => {
    e && e.preventDefault();
    if (!form.project || !form.amount || !form.department) {
      alert('Please fill in Project, Department, and Amount.'); return;
    }
    onSave({
      ...form,
      id: isEditing ? form.id : uid(),
      amount: Number(form.amount),
      createdAt: isEditing ? form.createdAt : nowISO(),
      updatedAt: nowISO(),
    });
    if (!isEditing) setForm({ ...emptyForm });
  };

  const grd2 = { display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))', gap:12 };

  return (
    <form onSubmit={save} style={{ display:'flex', flexDirection:'column', gap:14 }}>
      {/* Project & Date */}
      <Section title="Transaction" accent="#1D4ED8" Icon={Receipt}>
        <div style={grd2}>
          <Field label="Project *">
            <ComboBox value={form.project} onChange={v => { update('project',v); if (onCreateProject && !projects.find(p=>p.name===v)) onCreateProject(v); }}
              options={projectNames} placeholder="Select project…" createLabel="project" />
          </Field>
          <Field label="Date">
            <Input type="date" value={form.date} onChange={e=>update('date',e.target.value)} />
          </Field>
          <Field label="Bill / Invoice Number">
            <Input value={form.billNumber} onChange={e=>update('billNumber',e.target.value)} placeholder="Auto or enter manually"
              onFocus={autoBillNumber} />
          </Field>
          <Field label="Department *">
            <select value={form.department} onChange={e=>update('department',e.target.value)} style={{ ...inputStyle, cursor:'pointer' }}>
              <option value="">Select…</option>
              {DEPARTMENTS.map(d=><option key={d.name} value={d.name}>{d.emoji} {d.name}</option>)}
            </select>
          </Field>
          <Field label="Category / Description">
            <Input value={form.category} onChange={e=>update('category',e.target.value)} placeholder="e.g. Raw Materials" />
          </Field>
          <Field label="Amount (₹) *">
            <Input type="number" value={form.amount} onChange={e=>update('amount',e.target.value)} placeholder="0" />
          </Field>
          <Field label="Paid By">
            <ComboBox value={form.paidBy} onChange={v=>update('paidBy',v)} options={allPartyOptions} placeholder="EVGCPL / payer" createLabel="party" />
          </Field>
          <Field label="Paid To">
            <ComboBox value={form.paidTo} onChange={v=>update('paidTo',v)} options={allPartyOptions} placeholder="Vendor / payee" createLabel="party" />
          </Field>
        </div>
      </Section>

      {/* Payment Method */}
      <Section title="Payment Method" accent="#0EA5E9" Icon={Wallet}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(96px,1fr))', gap:8, marginBottom: activeMode.needs.length>0?12:0 }}>
          {PAYMENT_MODES.map(m => (
            <button key={m.value} type="button" onClick={()=>update('paymentMode',m.value)}
              style={{ padding:'9px 6px', borderRadius:9, border:`1px solid ${form.paymentMode===m.value ? '#0EA5E9' : 'var(--border)'}`, background: form.paymentMode===m.value ? 'rgba(14,165,233,0.12)' : 'var(--surface)', color: form.paymentMode===m.value ? '#0EA5E9' : 'var(--text-3)', cursor:'pointer', fontSize:11, fontWeight:600 }}>
              {m.label}
            </button>
          ))}
        </div>
        {activeMode.needs.length > 0 && (
          <div style={{ ...grd2, marginTop:4 }}>
            {activeMode.needs.includes('chequeNo') && <Field label="Cheque No."><Input value={form.chequeNo} onChange={e=>update('chequeNo',e.target.value)} placeholder="123456"/></Field>}
            {activeMode.needs.includes('bank')     && <Field label="Bank"><Input value={form.bank} onChange={e=>update('bank',e.target.value)} placeholder="HDFC"/></Field>}
            {activeMode.needs.includes('upiId')    && <Field label="UPI ID"><Input value={form.upiId} onChange={e=>update('upiId',e.target.value)} placeholder="vendor@okicici"/></Field>}
            {activeMode.needs.includes('txnId')    && <Field label="Transaction ID"><Input value={form.txnId} onChange={e=>update('txnId',e.target.value)} placeholder="UPI ref…"/></Field>}
            {activeMode.needs.includes('utr')      && <Field label="UTR / Ref No."><Input value={form.utr} onChange={e=>update('utr',e.target.value)} placeholder="HDFCN…"/></Field>}
            {activeMode.needs.includes('cardLast4')&& <Field label="Card last 4"><Input value={form.cardLast4} onChange={e=>update('cardLast4',e.target.value)} placeholder="0000" maxLength={4}/></Field>}
          </div>
        )}
      </Section>

      {/* Status & Approval */}
      <Section title="Approval Status" accent="#7C3AED" Icon={ShieldCheck}>
        <Field label="Current Stage" wide>
          <StatusSelect value={form.status} onChange={v=>update('status',v)} />
        </Field>
        <div style={{ ...grd2, marginTop:12 }}>
          <Field label="Finance Approved By">
            <ComboBox value={form.financeApprovedBy} onChange={v=>update('financeApprovedBy',v)} options={allPartyOptions} placeholder="Finance approver" createLabel="person" />
          </Field>
          <Field label="Finance Approved At">
            <Input type="datetime-local" value={form.financeApprovedAt ? form.financeApprovedAt.slice(0,16):''} onChange={e=>update('financeApprovedAt', e.target.value ? new Date(e.target.value).toISOString() : '')} />
          </Field>
          <Field label="Director Approved By">
            <ComboBox value={form.directorApprovedBy} onChange={v=>update('directorApprovedBy',v)} options={allPartyOptions} placeholder="Director / C-Level" createLabel="person" />
          </Field>
          <Field label="Director Approved At">
            <Input type="datetime-local" value={form.directorApprovedAt ? form.directorApprovedAt.slice(0,16):''} onChange={e=>update('directorApprovedAt', e.target.value ? new Date(e.target.value).toISOString() : '')} />
          </Field>
        </div>
        {form.status === 'rejected' && (
          <div style={{ ...grd2, marginTop:12 }}>
            <Field label="Rejected By">
              <Input value={form.rejectedBy} onChange={e=>update('rejectedBy',e.target.value)} placeholder="Who rejected" />
            </Field>
            <Field label="Rejection Note" wide>
              <textarea value={form.rejectionNote} onChange={e=>update('rejectionNote',e.target.value)} placeholder="Reason…" rows={2}
                style={{ ...inputStyle, resize:'vertical' }} />
            </Field>
          </div>
        )}
      </Section>

      {/* Description */}
      <Section title="Details" accent="#059669" Icon={FileText}>
        <Field label="Description / Purpose" wide>
          <textarea value={form.description} onChange={e=>update('description',e.target.value)} placeholder="Context for this expense…" rows={3}
            style={{ ...inputStyle, resize:'vertical' }} />
        </Field>
      </Section>

      {/* Submit */}
      <div style={{ display:'flex', gap:10, position:'sticky', bottom:16, zIndex:10 }}>
        {onClose && <button type="button" onClick={onClose} style={{ padding:'13px 20px', borderRadius:13, border:'1px solid var(--border)', background:'var(--surface)', color:'var(--text-2)', fontWeight:600, fontSize:13, cursor:'pointer' }}>Cancel</button>}
        <button type="submit" style={{ flex:1, padding:'13px 0', borderRadius:13, border:'none', background:'linear-gradient(135deg,#1D4ED8,#7C3AED)', color:'#fff', fontWeight:700, fontSize:14, cursor:'pointer', boxShadow:'0 8px 20px rgba(29,78,216,0.3)' }}>
          {isEditing ? '✓ Update Bill' : '+ Save Bill'}
        </button>
      </div>
    </form>
  );
}

// ─── BILL EXPANDED ────────────────────────────────────────────
function BillExpanded({ bill, onClose, onDelete, onUpdate }) {
  const dept = getDept(bill.department);

  const DRow = ({ k, v }) => v ? (

      <span style={{ color:'var(--text)', fontWeight:500, textAlign:'right', wordBreak:'break-word' }}>{v}</span>

    <div className="fade-in" style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:16, padding:18, boxShadow:'var(--shadow-md)', marginTop:8 }}>

      </div>

      <div style={{ fontFamily:'"IBM Plex Mono",monospace', fontWeight:700, fontSize:22, color:'var(--text)', marginBottom:10 }}>{formatCurrency(bill.amount)}</div>

      <ApprovalTimeline bill={bill} />

      <div style={{ marginTop:12, display:'flex', flexDirection:'column', gap:0 }}>
        <DRow k="Bill No."    v={bill.billNumber} />
        <DRow k="Date"        v={fmtDate(bill.date)} />
        <DRow k="Category"    v={bill.category} />
        <DRow k="Paid By"     v={bill.paidBy} />
        <DRow k="Paid To"     v={bill.paidTo} />
        <DRow k="Payment"     v={bill.paymentMode?.toUpperCase()} />
        {bill.utr     && <DRow k="UTR"       v={bill.utr} />}
        {bill.bank    && <DRow k="Bank"      v={bill.bank} />}
        {bill.chequeNo&& <DRow k="Cheque"    v={bill.chequeNo} />}
        {bill.upiId   && <DRow k="UPI ID"    v={bill.upiId} />}
        {bill.txnId   && <DRow k="Txn ID"    v={bill.txnId} />}
        <DRow k="Description" v={bill.description} />
        <DRow k="Created"     v={fmtDateTime(bill.createdAt)} />
      </div>

      <ApprovalActions bill={bill} onUpdate={onUpdate} />

      {onDelete && (
        <button onClick={() => { if(window.confirm('Delete this bill?')) onDelete(bill.id); }}
          style={{ marginTop:10, display:'flex', alignItems:'center', gap:6, fontSize:11, color:'#DC2626', background:'none', border:'none', cursor:'pointer', padding:'4px 0' }}>
          <Trash2 size={12}/>Delete Bill
        </button>
      )}
    </div>
  );
}

// ─── BILLS SCREEN ─────────────────────────────────────────────
function BillsScreen({ bills, projects, parties, projectFilter, onSave, onDelete, onUpdate, onCreateProject }) {
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [editingBill, setEditingBill] = useState(null);
  const [expanded, setExpanded]     = useState(null);
  const [query, setQuery]           = useState('');
  const [stageFilter, setStageFilter] = useState('');

  const scoped = useMemo(() => {
    let b = projectFilter ? bills.filter(b=>b.project?.toLowerCase()===projectFilter.name.toLowerCase()) : bills;
    if (stageFilter) b = b.filter(x=>x.status===stageFilter);
    if (query.trim()) {
      const q = query.toLowerCase();
      b = b.filter(x=>[x.project,x.department,x.paidBy,x.paidTo,x.billNumber,x.category,x.description].filter(Boolean).join(' ').toLowerCase().includes(q));
    }
    return [...b].sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
  }, [bills, projectFilter, stageFilter, query]);

  const openEdit = (bill) => { setEditingBill(bill); setDrawerOpen(true); setExpanded(null); };
  const closeDrawer = () => { setDrawerOpen(false); setEditingBill(null); };

  const handleSave = (bill) => {
    onSave(bill);
    closeDrawer();
  };

  return (
    <div className="fade-in">
      {/* Header */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16, flexWrap:'wrap', gap:10 }}>
        <div>
          <div style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', color:'var(--text-3)' }}>{projectFilter ? `${projectFilter.name} ·` : ''} Bills</div>
          <h2 style={{ margin:0, fontSize:22, fontWeight:800, color:'var(--text)' }}>All Transactions</h2>
        </div>
        <button onClick={()=>{setEditingBill(null);setDrawerOpen(true);}}
          style={{ padding:'10px 18px', borderRadius:12, border:'none', background:'linear-gradient(135deg,#1D4ED8,#7C3AED)', color:'#fff', fontWeight:700, fontSize:13, cursor:'pointer', display:'flex', alignItems:'center', gap:7, boxShadow:'0 4px 14px rgba(29,78,216,0.3)' }}>
          <Plus size={15}/>New Bill
        </button>
      </div>

      {/* Filters */}
      <div style={{ display:'flex', gap:8, marginBottom:14, flexWrap:'wrap' }}>
        <div style={{ flex:1, minWidth:180, display:'flex', alignItems:'center', gap:8, background:'var(--surface)', border:'1px solid var(--border)', borderRadius:10, padding:'8px 12px' }}>
          <Search size={13} style={{ color:'var(--text-4)', flexShrink:0 }}/>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search bills…"
            style={{ border:'none', background:'none', color:'var(--text)', fontSize:13, outline:'none', flex:1 }} />
        </div>
        <select value={stageFilter} onChange={e=>setStageFilter(e.target.value)}
          style={{ padding:'8px 12px', borderRadius:10, border:'1px solid var(--border)', background:'var(--surface)', color:'var(--text)', fontSize:12, cursor:'pointer', outline:'none' }}>
          <option value="">All Stages</option>
          {STAGES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
        </select>
      </div>

      {/* Drawer */}
      {drawerOpen && (
        <div style={{ position:'fixed', top:0, right:0, bottom:0, width:'min(560px,100vw)', background:'var(--surface)', boxShadow:'-8px 0 40px rgba(0,0,0,0.15)', zIndex:200, overflowY:'auto', padding:24 }} className="slide-in">
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
            <h3 style={{ margin:0, fontSize:18, fontWeight:700, color:'var(--text)' }}>{editingBill?'Edit Bill':'New Bill'}</h3>
            <button onClick={closeDrawer} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-3)' }}><X size={18}/></button>
          </div>
          <BillForm onSave={handleSave} projects={projects} parties={parties} bills={bills}

      )}
      {drawerOpen && <div onClick={closeDrawer} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.35)', zIndex:199 }} />}

          <div style={{ fontSize:12 }}>Adjust filters or add a new bill.</div>

      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          {scoped.map(bill => (
            <div key={bill.id}>
              <div onClick={()=>setExpanded(expanded===bill.id?null:bill.id)}
                style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:14, padding:'12px 16px', cursor:'pointer', display:'flex', alignItems:'center', gap:12, transition:'box-shadow 0.15s', boxShadow: expanded===bill.id ? 'var(--shadow-md)' : 'var(--shadow-sm)' }}

                  </div>
                  <div style={{ fontSize:11, color:'var(--text-3)', marginTop:2 }}>{bill.department}{bill.category?' · '+bill.category:''}</div>
                </div>
                <div style={{ textAlign:'right', flexShrink:0 }}>
                  <div style={{ fontFamily:'"IBM Plex Mono",monospace', fontWeight:700, fontSize:14, color:'var(--text)' }}>{formatCurrency(bill.amount)}</div>
                  <StatusBadge status={bill.status} />

                <div style={{ marginLeft:4, display:'flex', flexDirection:'column', gap:4 }}>
                  <button onClick={e=>{e.stopPropagation();openEdit(bill);}} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-3)', padding:4 }}><Pencil size={13}/></button>
                  {expanded===bill.id ? <ChevronUp size={13} style={{color:'var(--text-3)'}}/> : <ChevronDown size={13} style={{color:'var(--text-3)'}}/>}
                </div>
              </div>
              {expanded === bill.id && (
                <BillExpanded bill={bill} onDelete={onDelete} onUpdate={b=>{onUpdate(b);}}/>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── LEDGER VIEW ──────────────────────────────────────────────
function LedgerView({ bills, projectFilter }) {
  const [mode, setMode] = useState('department');
  const [expanded, setExpanded] = useState(null);
  const [query, setQuery] = useState('');

  const scoped = useMemo(() => {
    let b = projectFilter ? bills.filter(b=>b.project?.toLowerCase()===projectFilter.name.toLowerCase()) : bills;
    if (query.trim()) {
      const q = query.toLowerCase();
      b = b.filter(x=>[x.project,x.department,x.paidBy,x.paidTo,x.billNumber,x.category].filter(Boolean).join(' ').toLowerCase().includes(q));
    }
    return b;
  }, [bills, projectFilter, query]);

  const groups = useMemo(() => {
    const map = new Map();
    scoped.forEach(b => {
      const key = mode === 'department' ? (b.department||'Uncategorised') : (b.paidTo||b.paidBy||'Unknown');
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(b);
    });
    return Array.from(map.entries()).map(([name, list]) => ({
      name, list,
      total: list.reduce((s,b)=>s+Number(b.amount||0),0),
      paid: list.filter(b=>b.status==='paid').reduce((s,b)=>s+Number(b.amount||0),0),
      count: list.length,
    })).sort((a,b)=>b.total-a.total);
  }, [scoped, mode]);

  return (
    <div className="fade-in">
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16, flexWrap:'wrap', gap:10 }}>
        <div>
          <div style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', color:'var(--text-3)' }}>Ledger</div>
          <h2 style={{ margin:0, fontSize:22, fontWeight:800, color:'var(--text)' }}>Grouped View</h2>
        </div>
        <div style={{ display:'flex', gap:6 }}>
          {['department','party'].map(m=>(
            <button key={m} onClick={()=>setMode(m)} style={{ padding:'7px 14px', borderRadius:9, border:'1px solid var(--border)', background: mode===m ? 'var(--brand-1)' : 'var(--surface)', color: mode===m ? '#fff' : 'var(--text-3)', fontWeight:600, fontSize:12, cursor:'pointer' }}>
              {m==='department'?'By Dept':'By Party'}
            </button>
          ))}
        </div>
      </div>

      <div style={{ display:'flex', alignItems:'center', gap:8, background:'var(--surface)', border:'1px solid var(--border)', borderRadius:10, padding:'8px 12px', marginBottom:14 }}>
        <Search size={13} style={{ color:'var(--text-4)', flexShrink:0 }}/>
        <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search…"
          style={{ border:'none', background:'none', color:'var(--text)', fontSize:13, outline:'none', flex:1 }} />
      </div>

      {groups.map(g => {
        const dept = mode==='department' ? getDept(g.name) : null;
        const color = dept?.color || '#7C3AED';
        const isExp = expanded === g.name;
        return (
          <div key={g.name} style={{ marginBottom:8 }}>
            <div onClick={()=>setExpanded(isExp?null:g.name)}
              style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:14, padding:'14px 16px', cursor:'pointer', display:'flex', alignItems:'center', gap:14, boxShadow:'var(--shadow-sm)' }}>
              <div style={{ width:44, height:44, borderRadius:12, background:color+'18', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0 }}>
                {mode==='department' ? (dept?.emoji||'📦') : '👤'}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontWeight:700, fontSize:14, color:'var(--text)', marginBottom:2 }}>{g.name}</div>
                <div style={{ fontSize:11, color:'var(--text-3)' }}>{g.count} transaction{g.count!==1?'s':''} · Paid: {formatCurrency(g.paid)}</div>
              </div>
              <div style={{ textAlign:'right' }}>
                <div style={{ fontFamily:'"IBM Plex Mono",monospace', fontWeight:700, fontSize:16, color:'var(--text)' }}>{formatCurrency(g.total)}</div>
              </div>
              {isExp ? <ChevronUp size={16} style={{color:'var(--text-3)'}}/> : <ChevronDown size={16} style={{color:'var(--text-3)'}}/>}
            </div>
            {isExp && (
              <div style={{ marginLeft:12, borderLeft:`2px solid ${color}44`, paddingLeft:12, marginTop:4, display:'flex', flexDirection:'column', gap:4 }} className="fade-in">
                {g.list.sort((a,b)=>Number(b.amount)-Number(a.amount)).map(bill=>(
                  <div key={bill.id} style={{ background:'var(--surface-2)', border:'1px solid var(--border)', borderRadius:10, padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontWeight:600, fontSize:12, color:'var(--text)' }}>{bill.paidTo||bill.paidBy||'—'}{bill.billNumber?` (${bill.billNumber})`:''}</div>
                      <div style={{ fontSize:11, color:'var(--text-3)' }}>{fmtDate(bill.date)}{bill.category?' · '+bill.category:''}</div>
                    </div>
                    <div style={{ textAlign:'right' }}>
                      <div style={{ fontFamily:'"IBM Plex Mono",monospace', fontWeight:700, fontSize:13, color:'var(--text)' }}>{formatCurrency(bill.amount)}</div>
                      <StatusBadge status={bill.status} />
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────
function DashboardScreen({ bills, projects, projectFilter }) {
  const scoped = useMemo(() => projectFilter ? bills.filter(b=>b.project?.toLowerCase()===projectFilter.name.toLowerCase()) : bills, [bills, projectFilter]);

  const totals = useMemo(() => {
    const total   = scoped.reduce((s,b)=>s+Number(b.amount||0),0);
    const paid    = scoped.filter(b=>b.status==='paid').reduce((s,b)=>s+Number(b.amount||0),0);
    const pending = scoped.filter(b=>['draft','pending','finance_approved','director_approved'].includes(b.status)).reduce((s,b)=>s+Number(b.amount||0),0);
    return { total, paid, pending, count: scoped.length, depts: new Set(scoped.map(b=>b.department)).size };
  }, [scoped]);

  const stageMix = useMemo(() => {
    const m = {};
    STAGES.forEach(s => { m[s.key] = 0; });
    scoped.forEach(b => { if (m[b.status] != null) m[b.status]++; });
    return m;
  }, [scoped]);

  const byDept = useMemo(() => {
    const map = new Map();
    scoped.forEach(b => {
      if (!b.department) return;
      if (!map.has(b.department)) map.set(b.department, 0);
      map.set(b.department, map.get(b.department) + Number(b.amount||0));
    });
    return [...map.entries()].sort((a,b)=>b[1]-a[1]).slice(0,8);
  }, [scoped]);

  const maxDept = byDept[0]?.[1] || 1;

  const Kpi = ({ label, value, sub, color }) => (
    <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:16, padding:'16px 18px', boxShadow:'var(--shadow-sm)' }}>
      <div style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', color:'var(--text-3)', marginBottom:6 }}>{label}</div>
      <div style={{ fontFamily:'"IBM Plex Mono",monospace', fontWeight:700, fontSize:22, color: color||'var(--text)' }}>{value}</div>
      {sub && <div style={{ fontSize:11, color:'var(--text-3)', marginTop:4 }}>{sub}</div>}
    </div>
  );

  return (
    <div className="fade-in">
      <div style={{ marginBottom:16 }}>
        <div style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', color:'var(--text-3)' }}>{projectFilter?`${projectFilter.name} ·`:'Overview'}</div>
        <h2 style={{ margin:0, fontSize:22, fontWeight:800, color:'var(--text)' }}>Dashboard</h2>
      </div>

      {/* KPIs */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))', gap:10, marginBottom:16 }}>
        <Kpi label="Total Spend" value={formatCurrency(totals.total)} sub={`${totals.count} bill${totals.count!==1?'s':''}`} color="#1D4ED8" />
        <Kpi label="Paid" value={formatCurrency(totals.paid)} sub="Released" color="#16A34A" />
        <Kpi label="In Pipeline" value={formatCurrency(totals.pending)} sub="Pending approval" color="#D97706" />
        <Kpi label="Departments" value={totals.depts} sub="Active" />
      </div>

      {/* Approval Pipeline Breakdown */}
      <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:16, padding:18, marginBottom:14, boxShadow:'var(--shadow-sm)' }}>
        <div style={{ fontSize:12, fontWeight:700, color:'var(--text)', marginBottom:14 }}>Approval Pipeline Breakdown</div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(90px,1fr))', gap:8 }}>
          {STAGES.map(s => {
            const count = stageMix[s.key] || 0;
            const Icon = s.Icon;
            return (
              <div key={s.key} style={{ textAlign:'center', padding:'10px 6px', background: count > 0 ? s.bg : 'var(--surface-2)', borderRadius:12, border:`1px solid ${count>0?s.color+'33':'var(--border)'}` }}>
                <Icon size={16} style={{ color: count>0 ? s.color : 'var(--text-4)', margin:'0 auto 4px', display:'block' }} />
                <div style={{ fontFamily:'"IBM Plex Mono",monospace', fontWeight:700, fontSize:18, color: count>0 ? s.color : 'var(--text-3)' }}>{count}</div>
                <div style={{ fontSize:9, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.05em', color:'var(--text-3)' }}>{s.short}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Dept Bar Chart */}
      <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:16, padding:18, boxShadow:'var(--shadow-sm)' }}>
        <div style={{ fontSize:12, fontWeight:700, color:'var(--text)', marginBottom:14 }}>Spend by Department</div>
        {byDept.length === 0 ? (
          <div style={{ textAlign:'center', padding:'24px 0', color:'var(--text-4)', fontSize:12 }}>No data yet</div>
        ) : (
          byDept.map(([name, total]) => {
            const dept = getDept(name);
            const pct  = (total / maxDept) * 100;
            return (
              <div key={name} style={{ marginBottom:10 }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:3 }}>
                  <span style={{ fontSize:12, color:'var(--text-2)', fontWeight:500 }}>{dept?.emoji||''} {name}</span>
                  <span style={{ fontSize:11, fontFamily:'"IBM Plex Mono",monospace', color:'var(--text-3)' }}>{formatCurrency(total)}</span>
                </div>
                <div style={{ height:7, borderRadius:4, background:'var(--surface-3)', overflow:'hidden' }}>
                  <div style={{ height:'100%', width:`${pct}%`, background: dept?.color||'#1D4ED8', borderRadius:4, transition:'width 0.5s ease' }} />
                </div>
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

// ─── PROJECTS SCREEN ──────────────────────────────────────────

  return (
    <div className="fade-in">

            <Field label="Project Name"><Input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Project Alpha" /></Field>
            <Field label="Prefix (for bill numbers)"><Input value={form.prefix} onChange={e=>setForm(f=>({...f,prefix:e.target.value.toUpperCase()}))} placeholder="ALPH" maxLength={6} /></Field>
            <Field label="Notes" wide><Input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Optional description" /></Field>
          </div>
          <Field label="Colour">
            <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginTop:4 }}>
              {COLORS.map(c=>(
                <button key={c} type="button" onClick={()=>setForm(f=>({...f,color:c}))} style={{ width:28, height:28, borderRadius:'50%', background:c, border: form.color===c ? '3px solid var(--text)' : '2px solid transparent', cursor:'pointer' }} />
              ))}
            </div>
          </Field>
          <div style={{ display:'flex', gap:8, marginTop:14 }}>
            <button onClick={()=>setShowForm(false)} style={{ padding:'9px 16px', borderRadius:9, border:'1px solid var(--border)', background:'var(--surface-2)', color:'var(--text-2)', fontWeight:600, fontSize:12, cursor:'pointer' }}>Cancel</button>
            <button onClick={save} style={{ padding:'9px 16px', borderRadius:9, border:'none', background:'#1D4ED8', color:'#fff', fontWeight:700, fontSize:12, cursor:'pointer' }}>Save Project</button>
          </div>
        </div>
      )}

      {projects.length === 0 ? (
        <div style={{ textAlign:'center', padding:'60px 20px', color:'var(--text-3)', background:'var(--surface)', borderRadius:16, border:'1px solid var(--border)' }}>
          <Receipt size={36} style={{ color:'var(--text-4)', margin:'0 auto 10px', display:'block' }}/>
          <div style={{ fontWeight:700, marginBottom:4, color:'var(--text-2)' }}>No projects yet</div>
          <div style={{ fontSize:12 }}>Create your first project to start logging bills.</div>
        </div>
      ) : projects.map(p => {
        const billCount = bills.filter(b=>b.project===p.name).length;
        const total     = bills.filter(b=>b.project===p.name).reduce((s,b)=>s+Number(b.amount||0),0);
        return (
          <div key={p.id} style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:14, padding:'14px 16px', display:'flex', alignItems:'center', gap:14, marginBottom:8, boxShadow:'var(--shadow-sm)' }}>
            <div style={{ width:44, height:44, borderRadius:12, background:p.color, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'"IBM Plex Mono",monospace', fontWeight:700, fontSize:13, color:'#fff', flexShrink:0 }}>{p.prefix}</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontWeight:700, fontSize:14, color:'var(--text)' }}>{p.name}</div>
              <div style={{ fontSize:11, color:'var(--text-3)' }}>{billCount} bills · {formatCurrency(total)}{p.notes?' · '+p.notes:''}</div>
            </div>
            <button onClick={()=>onDeleteProject(p.id)} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-4)', padding:4 }}><Trash2 size={14}/></button>
          </div>
        );
      })}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────
function App() {
  const [theme, setTheme]               = useState(() => LS.get('evgl-theme') || 'light');
  const [user, setUser]                 = useState(() => LS.get('evgl-user'));
  const [screen, setScreen]             = useState('dashboard');
  const [projectFilter, setProjectFilter] = useState(null);

  const seed = getDemoSeed();
  const [bills, setBills]       = useState(() => LS.get('evgl-bills')    || seed.bills);
  const [projects, setProjects] = useState(() => LS.get('evgl-projects') || seed.projects);
  const [parties, setParties]   = useState(() => LS.get('evgl-parties')  || seed.parties);

  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); LS.set('evgl-theme', theme); }, [theme]);
  useEffect(() => { LS.set('evgl-bills', bills); }, [bills]);
  useEffect(() => { LS.set('evgl-projects', projects); }, [projects]);
  useEffect(() => { LS.set('evgl-parties', parties); }, [parties]);

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  const onLogin = (email, pin) => {
    if (email.trim().toLowerCase() === ADMIN_EMAIL && pin === ADMIN_PIN) {
      const u = { email, role: 'admin' };
      setUser(u); LS.set('evgl-user', u);
      return { ok: true };
    }
    return { ok: false, error: 'Incorrect email or PIN.' };
  };

  const onLogout = () => { setUser(null); LS.set('evgl-user', null); setScreen('dashboard'); setProjectFilter(null); };

  const saveBill = (bill) => {
    setBills(prev => {
      const exists = prev.find(b => b.id === bill.id);
      const updated = exists ? prev.map(b => b.id === bill.id ? bill : b) : [bill, ...prev];
      // Ensure party entries exist
      [bill.paidBy, bill.paidTo].filter(Boolean).forEach(name => {
        setParties(pp => pp.find(p=>p.name===name) ? pp : [...pp, { id:uid(), name }]);
      });
      return updated;
    });
  };

  const deleteBill   = (id) => setBills(prev => prev.filter(b => b.id !== id));
  const updateBill   = (bill) => setBills(prev => prev.map(b => b.id === bill.id ? bill : b));

  const saveProject  = (p) => setProjects(prev => { const e = prev.find(x=>x.id===p.id); return e ? prev.map(x=>x.id===p.id?p:x) : [...prev, p]; });
  const deleteProject= (id) => setProjects(prev => prev.filter(p => p.id !== id));

  const createProjectFromBill = (name) => {
    if (!projects.find(p => p.name === name)) {
      const prefix = name.replace(/[^a-zA-Z]/g,'').slice(0,4).toUpperCase() || 'PROJ';
      saveProject({ id:uid(), name, prefix, color:'#1D4ED8', notes:'', enabled:true, createdAt:nowISO(), billCounter:0 });
    }
  };

  if (!user) return <LoginScreen onLogin={onLogin} theme={theme} toggleTheme={toggleTheme} />;

  const navItems = [
    { id:'dashboard', label:'Dashboard', Icon:BarChart3 },
    { id:'bills',     label:'Bills',     Icon:Receipt },
    { id:'ledger',    label:'Ledger',    Icon:FileText },
    { id:'projects',  label:'Projects',  Icon:Building2 },
  ];

  return (
    <div style={{ minHeight:'100vh', background:'var(--bg)' }}>
      {/* Top Nav */}
      <nav style={{ background:'var(--surface)', borderBottom:'1px solid var(--border)', position:'sticky', top:0, zIndex:100, boxShadow:'var(--shadow-sm)' }}>
        <div style={{ maxWidth:1100, margin:'0 auto', padding:'0 16px', display:'flex', alignItems:'center', gap:0 }}>
          {/* Logo */}
          <div style={{ display:'flex', alignItems:'center', gap:10, padding:'12px 16px 12px 0', borderRight:'1px solid var(--border)', marginRight:8, flexShrink:0 }}>
            <div style={{ width:30, height:30, borderRadius:9, background:'linear-gradient(135deg,#1D4ED8,#7C3AED)', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <Building2 size={15} style={{ color:'#fff' }} />
            </div>
            <span style={{ fontWeight:800, fontSize:15, color:'var(--text)' }}>EVG Ledger</span>
          </div>

          {/* Nav */}
          <div style={{ display:'flex', flex:1, gap:0 }}>
            {navItems.map(n => {
              const active = screen === n.id;
              return (
                <button key={n.id} onClick={()=>setScreen(n.id)}
                  style={{ padding:'14px 14px', border:'none', borderBottom: active ? '2px solid #1D4ED8' : '2px solid transparent', background:'none', color: active ? '#1D4ED8' : 'var(--text-3)', fontWeight: active ? 700 : 500, fontSize:13, cursor:'pointer', display:'flex', alignItems:'center', gap:6, transition:'color 0.15s', flexShrink:0 }}>
                  <n.Icon size={14} /><span className="hidden sm:inline">{n.label}</span>
                </button>
              );
            })}
          </div>

          {/* Right side */}
          <div style={{ display:'flex', alignItems:'center', gap:8, paddingLeft:8 }}>
            {/* Project filter pill */}
            {projects.length > 0 && (
              <select value={projectFilter?.id||''} onChange={e => setProjectFilter(e.target.value ? projects.find(p=>p.id===e.target.value) : null)}
                style={{ padding:'5px 10px', borderRadius:8, border:'1px solid var(--border)', background:'var(--surface-2)', color:'var(--text)', fontSize:11, cursor:'pointer', outline:'none', maxWidth:120 }}>
                <option value="">All Projects</option>
                {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            )}
            <button onClick={toggleTheme} style={{ background:'var(--surface-2)', border:'1px solid var(--border)', borderRadius:8, padding:'6px 8px', color:'var(--text-3)', cursor:'pointer', display:'flex', alignItems:'center' }}>
              {theme==='dark'?<Sun size={13}/>:<Moon size={13}/>}
            </button>
            <button onClick={onLogout} style={{ background:'none', border:'none', cursor:'pointer', fontSize:11, color:'var(--text-3)', padding:'6px 8px', borderRadius:8 }}>Sign out</button>
          </div>
        </div>
      </nav>

      {/* Main content */}
      <main style={{ maxWidth:1100, margin:'0 auto', padding:'20px 16px 60px' }}>
        {screen==='dashboard' && <DashboardScreen bills={bills} projects={projects} projectFilter={projectFilter} />}
        {screen==='bills'     && <BillsScreen bills={bills} projects={projects} parties={parties} projectFilter={projectFilter} onSave={saveBill} onDelete={deleteBill} onUpdate={updateBill} onCreateProject={createProjectFromBill} />}
        {screen==='ledger'    && <LedgerView bills={bills} projectFilter={projectFilter} />}
        {screen==='projects'  && <ProjectsScreen projects={projects} bills={bills} onSaveProject={saveProject} onDeleteProject={deleteProject} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
