name: Pages Preview (mobile-view branch)

# Publishes a STATIC PREVIEW of the portal for device/responsive testing.
# Deploys ONLY the web files — internal docs (*.docx, *.pdf, handoff/recruitment
# notes), the Apps Script sources and build tooling are excluded so they are
# never exposed on the public Pages URL.
#
# Trigger: every push to the mobile-view branch, or manually via "Run workflow".

on:
  push:
    branches:
      - claude/mobile-view-development
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages-preview
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble web-only site (exclude internal docs)
        run: |
          set -e
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            --exclude 'node_modules' \
            --exclude 'apps-script' \
            --exclude '*.docx' \
            --exclude '*.pdf' \
            --exclude '*.md' \
            --exclude '*.zip' \
            --exclude 'build-portal.js' \
            ./ _site/
          # A tiny banner page so testers know this is a preview build.
          echo "Preview build of branch claude/mobile-view-development — $(date -u +%FT%TZ)" > _site/PREVIEW.txt

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
