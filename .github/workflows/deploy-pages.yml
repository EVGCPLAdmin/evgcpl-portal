name: Deploy to GitHub Pages

# Replaces the managed "Deploy from a branch" pipeline, which had no concurrency
# control: rapid successive pushes to main triggered overlapping Pages
# deployments, and GitHub Pages (one deployment in flight at a time) failed the
# loser with "Deployment failed, try again later." The `concurrency` group below
# serialises deploys so each completes instead of colliding.
#
# ONE-TIME REPO SETTING REQUIRED: Settings → Pages → Build and deployment →
# Source → "GitHub Actions" (so this workflow owns the deploy instead of the
# managed branch pipeline).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time. Do NOT cancel an in-progress deploy —
# let production deployments finish; newer queued runs wait their turn.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
