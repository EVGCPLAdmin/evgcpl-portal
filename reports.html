<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reports · EVGCPL Portal</title>
<link rel="icon" type="image/jpeg" href="assets/img/EG.jpg"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/portal.css"/>
<style>
  /* Report catalogue cards */
  .rpt-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:.85rem;
    margin-bottom:1.4rem;
  }
  .rpt-card {
    background:var(--surface);
    border:1.5px solid var(--border);
    border-radius:var(--rad);
    padding:1rem 1.1rem;
    cursor:pointer;
    transition:border-color var(--t-fast), box-shadow var(--t-fast), transform var(--t-fast);
  }
  .rpt-card:hover {
    border-color:var(--g6);
    box-shadow:0 4px 14px rgba(26,96,56,.1);
    transform:translateY(-1px);
  }
  .rpt-card.selected {
    border-color:var(--g6);
    background:rgba(46,125,50,.04);
    box-shadow:0 0 0 3px rgba(26,96,56,.1);
  }
  body.dark .rpt-card.selected {
    background:rgba(60,185,109,.06);
    box-shadow:0 0 0 3px rgba(60,185,109,.1);
  }
  .rpt-card .icon { font-size:1.3rem; margin-bottom:.35rem; }
  .rpt-card .name { font-weight:700; font-size:.92rem; color:var(--txt); margin-bottom:.3rem; }
  .rpt-card .desc { font-size:.74rem; color:var(--txt3); line-height:1.5; }

  /* Filter strip */
  .rpt-filters {
    display:flex; gap:.6rem;
    flex-wrap:wrap; align-items:flex-end;
  }
  .rpt-filt {
    display:flex; flex-direction:column; min-width:140px;
  }
  .rpt-filt-label {
    font-size:.7rem; font-weight:700; color:var(--txt3);
    text-transform:uppercase; letter-spacing:.04em; margin-bottom:.25rem;
  }
  .rpt-filt select {
    padding:.42rem .65rem;
    border:1px solid var(--border); border-radius:8px;
    font-family:inherit; font-size:.82rem;
    background:var(--surface); color:var(--txt);
    cursor:pointer;
  }
  .rpt-filt select:focus { outline:none; border-color:var(--g5); }

  .schedule-bar {
    margin-top:1rem;
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:.75rem 1rem;
    display:flex; align-items:center; gap:.8rem; flex-wrap:wrap;
  }
</style>
</head>
<body>

<div data-shell-root></div>

<main class="shell-main">
  <div id="pageHead"></div>
  <div id="errorSlot"></div>

  <!-- CATALOGUE -->
  <div class="rpt-grid" id="rptGrid"></div>

  <!-- FILTER + RUN PANEL -->
  <div id="rptPanel" style="display:none">
    <div class="card" style="margin-bottom:1rem">
      <div class="card-head">
        <h3 id="rptPanelTitle">Filters</h3>
        <div style="display:flex;gap:.5rem;align-items:center">
          <span class="tag" id="rptResultBadge" style="display:none">—</span>
          <button class="btn btn-primary btn-sm" id="rptRun">▶ Run report</button>
          <button class="btn btn-secondary btn-sm" id="rptDl" style="display:none">⬇ CSV</button>
        </div>
      </div>
      <div class="card-body">
        <div class="rpt-filters" id="rptFilters"></div>
      </div>
    </div>

    <div id="rptResults"></div>

    <div id="rptScheduleBar" class="schedule-bar">
      <span style="font-size:1.1rem">📅</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:.85rem;font-weight:600" id="rptSchedStatus">Not scheduled</div>
        <div style="font-size:.72rem;color:var(--txt3)" id="rptSchedSub">Auto-email this report on a custom schedule.</div>
      </div>
      <button class="btn btn-secondary btn-sm" id="rptSchedBtn">⚙ Configure</button>
      <button class="btn btn-secondary btn-sm" id="rptSchedTestBtn" style="display:none">▶ Send test now</button>
    </div>

    <!-- Schedule modal -->
    <div id="rptSchedModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;align-items:center;justify-content:center;padding:1rem">
      <div style="background:var(--surface);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)">
        <div style="background:linear-gradient(135deg,var(--g9),var(--g7));padding:1rem 1.4rem;color:#fff;display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-size:.7rem;opacity:.7;text-transform:uppercase;letter-spacing:.08em">Schedule report</div>
            <div id="rptSchedTitle" style="font-size:1.05rem;font-weight:700">—</div>
          </div>
          <button id="rptSchedClose" style="background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:1rem">✕</button>
        </div>
        <div style="padding:1.2rem 1.4rem;display:flex;flex-direction:column;gap:.75rem">
          <div style="display:flex;gap:.5rem;align-items:center">
            <label style="font-size:.78rem;font-weight:600;color:var(--txt2);min-width:90px">Frequency</label>
            <select id="rptSchedFreq" class="filt-sel" style="flex:1">
              <option value="off">Off (disabled)</option>
              <option value="daily">Every weekday</option>
              <option value="1">Mon</option><option value="2">Tue</option><option value="3">Wed</option>
              <option value="4">Thu</option><option value="5">Fri</option><option value="6">Sat</option>
              <option value="0">Sun</option>
            </select>
          </div>
          <div style="display:flex;gap:.5rem;align-items:center">
            <label style="font-size:.78rem;font-weight:600;color:var(--txt2);min-width:90px">Time (IST)</label>
            <input type="time" id="rptSchedTime" class="filt-in" value="08:00" style="flex:1"/>
          </div>
          <div>
            <label style="font-size:.78rem;font-weight:600;color:var(--txt2);display:block;margin-bottom:.3rem">Recipients</label>
            <div id="rptSchedRecipChips" style="display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.4rem;min-height:24px"></div>
            <div style="display:flex;gap:.4rem">
              <input type="email" id="rptSchedRecipInput" placeholder="email@evgcpl.com" class="filt-in" style="flex:1"/>
              <button class="btn btn-secondary btn-sm" id="rptSchedRecipAdd" type="button">Add</button>
            </div>
          </div>
          <div style="font-size:.72rem;color:var(--txt3);background:var(--surface2);padding:.55rem .7rem;border-radius:8px">
            ℹ Filters from the panel above will be applied at send time. Schedules persist in your browser; activation requires Apps Script time-driven trigger setup (see <code>scheduledDailyReport.gs</code>).
          </div>
        </div>
        <div style="padding:.85rem 1.4rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:flex-end">
          <button class="btn btn-secondary btn-sm" id="rptSchedDel">Delete schedule</button>
          <button class="btn btn-primary btn-sm" id="rptSchedSave">Save</button>
        </div>
      </div>
    </div>
  </div>

</main>

<script src="assets/js/state.js"></script>
<script src="assets/js/data-bindings.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/nav-config.js"></script>
<script src="assets/js/shell.js"></script>
<script src="assets/js/modules/reports.js"></script>

</body>
</html>
